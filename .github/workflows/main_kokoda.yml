name: Build and deploy PHP app to Azure Web App - KOKODA

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Azure App Service OneDeploy refuses overlapping deployments to the same app
# and returns 409 Conflict. Two pushes to main close together (e.g. PRs #65 and
# #66 merged 44s apart on 2026-06-20) therefore raced and the second deploy
# failed, leaving prod stale. Serialise deploys per ref and let later runs WAIT
# for the in-flight one instead of cancelling it, so every merge reaches prod.
concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo, pdo_mysql, redis

      - name: Copy .env
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-dev --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend assets
        run: |
          npm install
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CAC1F898AE334EF897E3CA8947575277 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A696757C790C490AB1A0E3B3C552C7CD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3514F9DC495F486099C0D7C8927D5036 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'KOKODA'
          slot-name: 'Production'
          package: .

      # Azure zip-deploy overlays files onto the persistent /home disk instead of
      # wiping it, so a stale bootstrap/cache/routes-v7.php (or config.php) survives
      # forever and Laravel serves it *instead of* routes/web.php — silently 404ing
      # every route added after the cache was built. Delete the cached files via the
      # Kudu VFS API after each deploy so routing/config are always read fresh.
      - name: Clear stale Laravel route/config cache on App Service
        run: |
          TOKEN=$(az account get-access-token --resource https://management.core.windows.net/ --query accessToken -o tsv)
          SCM="https://kokoda-dyg6f8dhgghbang2.scm.southeastasia-01.azurewebsites.net"
          for f in routes-v7.php config.php; do
            echo "Clearing bootstrap/cache/$f"
            curl -sS -o /dev/null -w "  HTTP %{http_code}\n" -X DELETE \
              -H "Authorization: Bearer $TOKEN" -H "If-Match: *" \
              "$SCM/api/vfs/site/wwwroot/bootstrap/cache/$f" || true
          done

      # Run database migrations INSIDE the app container. The Kudu /api/command
      # endpoint runs in the SCM container, which has NO `php` on its PATH, so
      # `php artisan migrate` there fails with exit 127 while Kudu still returns
      # HTTP 200 — a silent false success that never actually migrates (verified
      # 2026-06-30: the messages.meta / claims migrations stayed Pending after a
      # "successful" deploy). Instead, drop a single-use, token-gated PHP runner
      # into public/ via the Kudu VFS, invoke it over HTTPS so it executes in the
      # APP container (with prod DB access), and FAIL the deploy unless it prints
      # MIGRATE_OK. The runner deletes itself and invalidates its own opcache
      # entry on the first hit, so it is unreachable immediately afterwards.
      - name: Run Laravel migrations on App Service
        run: |
          set -euo pipefail
          AAD=$(az account get-access-token --resource https://management.core.windows.net/ --query accessToken -o tsv)
          SCM="https://kokoda-dyg6f8dhgghbang2.scm.southeastasia-01.azurewebsites.net"
          HOST="https://kokoda-dyg6f8dhgghbang2.southeastasia-01.azurewebsites.net"
          K=$(openssl rand -hex 16)
          echo "::add-mask::$K"
          NAME="_deploy_migrate_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}.php"
          cat > runner.php <<PHP
          <?php
          if ((\$_GET['k'] ?? '') !== '$K') { http_response_code(403); exit('forbidden'); }
          header('Content-Type: text/plain');
          // Self-clean FIRST so even a fatal error during migrate removes the runner.
          @unlink(__FILE__);
          if (function_exists('opcache_invalidate')) { @opcache_invalidate(__FILE__, true); }
          require __DIR__.'/../vendor/autoload.php';
          \$app = require __DIR__.'/../bootstrap/app.php';
          \$kernel = \$app->make(Illuminate\Contracts\Console\Kernel::class);
          \$status = \$kernel->call('migrate', ['--force' => true]);
          echo \$kernel->output();
          echo (\$status === 0 ? "MIGRATE_OK\n" : "MIGRATE_FAIL status=\$status\n");
          PHP
          echo "Uploading single-use migration runner to public/$NAME"
          curl -fsS -X PUT -H "Authorization: Bearer $AAD" -H "If-Match: *" \
            --data-binary @runner.php "$SCM/api/vfs/site/wwwroot/public/$NAME" >/dev/null
          echo "Invoking migrations in the app container..."
          OUT=$(curl -fsS "$HOST/$NAME?k=$K")
          echo "$OUT"
          # Belt-and-suspenders: remove the runner from disk even if self-delete failed.
          curl -sS -o /dev/null -X DELETE -H "Authorization: Bearer $AAD" -H "If-Match: *" \
            "$SCM/api/vfs/site/wwwroot/public/$NAME" || true
          echo "$OUT" | grep -q "MIGRATE_OK" || { echo "::error::Migration step failed"; exit 1; }