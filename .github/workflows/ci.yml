name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: mbstring, pdo_sqlite
          coverage: none
          cache: composer

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Prepare .env
        run: cp .env.example .env

      - name: Install PHP dependencies
        run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

      - name: Generate app key
        run: php artisan key:generate

      - name: Install JS dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Run tests
        run: composer test

  # Mirror the production build from main_kokoda.yml so that build-time failures
  # (PHP syntax errors, package:discover crashes, --no-dev autoload issues) are
  # caught at PR time instead of after merge, when only the CD pipeline runs them.
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo, pdo_mysql, redis
          tools: composer:v2
          coverage: none
          cache: composer

      - name: Lint PHP sources
        run: find routes app config database -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Prepare .env
        run: cp .env.example .env

      - name: Install dependencies (production mode)
        run: composer install --prefer-dist --no-progress --no-dev --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci
          npm run build
